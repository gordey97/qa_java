name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - run: mvn test
        env:
          MESTO_EMAIL: ${{ secrets.MESTO_EMAIL }}
          MESTO_PASSWORD: ${{ secrets.MESTO_PASSWORD }}
